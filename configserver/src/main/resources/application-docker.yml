spring:
  application:
    name: configserver
  profiles:
    active: native
  rabbitmq:
    addresses: ${RABBITMQ_URL}
    connection-timeout: 30000
  cloud:
    config:
      server:
        native:
          search-locations: classpath:/config

server:
  port: 8888

management:
  endpoints:
    web:
      exposure:
        include: "*"